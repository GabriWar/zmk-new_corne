# Loaded only when nice_epaper shield is active.
# Display + custom widget + nice-oled widget toggles.

# Increase wireless range (BT_CTLR choice doesn't resolve under settings_reset's BT setup)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# === Central (left) widgets ===
# WPM: number + speedometer, no luna, no bongo cat
CONFIG_NICE_OLED_WIDGET_WPM=y
CONFIG_NICE_OLED_WIDGET_WPM_LUNA=n
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=n

# HID indicators (caps lock), no luna, no bongo cat
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS=y
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_LUNA=n
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_BONGO_CAT=n

# Modifiers (Ctrl/Shift/Alt/Gui) — default fixed-symbol-box layout, no luna, no bongo cat
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_LUNA=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_BONGO_CAT=n

# === Peripheral (right) ===
# Smart battery — animated crystal that reflects battery state (info, not decoration).
# Replaces the default cat animation.
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SMART_BATTERY=y
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=n
