# Loaded only when nice_epaper shield is active.
# Display + custom widget + nice-oled widget toggles.

# Mono theme — proper black/white color mapping for 1bpp display
CONFIG_LV_USE_THEME_MONO=y

# LVGL internal logs OFF — avoid recursive log loops via USB CDC backend
CONFIG_LV_USE_LOG=n

# Display polarity inverted vs nice-oled defaults
CONFIG_NICE_OLED_WIDGET_INVERTED=y

# Drop output icon background rect (epaper default y) — renders as a black box
# behind the USB/BT icons under our inverted mono theme.
CONFIG_NICE_OLED_WIDGET_OUTPUT_BACKGROUND=n

# Custom status screen (nice-oled supplies it)
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Sidestep ls0xx blanking_off/on -ENOTSUP path that hangs the display thread
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n

# Increase wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# LVGL v9 draw paths consume more stack than v8 — bump to avoid overflow
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# === Widgets ===
# All main info widgets default y; only override luna / bongo cat off
# (gabriel doesn't want dog or bongo cat — wants max info, no decoration).

# WPM — line graph + numeric text label, no animations.
CONFIG_NICE_OLED_WIDGET_WPM_GRAPH=y
CONFIG_NICE_OLED_WIDGET_WPM_NUMBER=y
CONFIG_NICE_OLED_WIDGET_WPM_LUNA=n
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=n

# HID indicators (caps lock) — keep on, kill animations
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_LUNA=n
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_BONGO_CAT=n

# Modifiers (Ctrl/Shift/Alt/Gui) — fixed-symbol-box default, macOS Cmd/Opt icons
# (default is _MACOS via MODIFIERS_INDICATORS_FIXED_SYMBOL_OS choice).
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_LUNA=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_BONGO_CAT=n
# Layout: horizontal line on display (icons spread along pre_y → display X).
# Default BOX 2x2 sat on top of WPM graph. HOR keeps it as a thin row.
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_HOR=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_BOX=n
# Pre-rotate widget positioning (modifiers are drawn BEFORE rotate_canvas, so
# they go through the in-buffer 90° rotation along with all other widgets).
# Empirically on this nice_epaper rotation:
#   CUSTOM_X+  → display moves RIGHT
#   CUSTOM_Y-  → display moves UP
# (axis mapping is opposite to the post-rotate gabriwar draw — those go
# directly to canvas after rotate, this one rides through the rotation.)
CONFIG_NICE_OLED_WIDGET_MODIFIERS_CUSTOM_X=3
CONFIG_NICE_OLED_WIDGET_MODIFIERS_CUSTOM_Y=45

# === Peripheral (right) ===
# Animation widgets all OFF — both paths (draw_animation child-of-canvas, and
# SMART_BATTERY child-of-widget at TOP_LEFT covering 69x68) break the canvas
# rotation render on this side. Pure-canvas rendering shows status text only.
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SMART_BATTERY=n
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=n
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_GABRIWAR=y
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_MS=960
# Crystal/gabriwar drawn AFTER rotate_canvas, but lvgl9 canvas still composes
# subsequent draws as if rotated → axis swap on display vs. canvas params:
#   CUSTOM_X+  → display moves UP    (vertical axis)
#   CUSTOM_Y+  → display moves RIGHT (horizontal axis)
# So: tweak CUSTOM_Y to slide horizontally, CUSTOM_X to slide vertically.
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CUSTOM_X=49
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CUSTOM_Y=10
